name: Build and test

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Build against a range of HDF5 versions. The H5FD_class_t layout changed in
  # 1.14 (and the struct moved to H5FDdevelop.h), so the driver carries
  # H5_VERSION_GE guards; this matrix is what keeps both branches honest.
  hdf5-versions:
    name: HDF5 ${{ matrix.hdf5 }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}  # -l so the conda env is activated
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, hdf5: '1.10'}
          - {os: ubuntu-latest, hdf5: '1.12'}
          - {os: ubuntu-latest, hdf5: '1.14'}
          - {os: ubuntu-latest, hdf5: '2.1'}
          - {os: macos-latest, hdf5: '1.14'}
          - {os: macos-latest, hdf5: '2.1'}
          - {os: windows-latest, hdf5: '1.14'}
          - {os: windows-latest, hdf5: '2.1'}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up conda with HDF5 ${{ matrix.hdf5 }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: remfile
        channels: conda-forge
        conda-remove-defaults: true

    - name: Install HDF5 and libcurl
      run: conda install -y "hdf5=${{ matrix.hdf5 }}" libcurl

    - name: Configure
      # CMAKE_PREFIX_PATH so find_package(CURL) also looks in the conda env;
      # it only searches system paths otherwise. Warnings are errors in CI
      # only, so new compiler versions don't break downstream builds.
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          export PREFIX_PATH="$CONDA_PREFIX/Library"
        else
          export PREFIX_PATH="$CONDA_PREFIX"
        fi
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
              -DCMAKE_PREFIX_PATH="$PREFIX_PATH" \
              -DHDF5_ROOT="$PREFIX_PATH" \
              -DHDF5_USE_STATIC_LIBRARIES=OFF

    - name: Build
      run: cmake --build build --config Release -j 2

    - name: Run the test suite (hermetic — no network)
      run: ctest --test-dir build -C Release --output-on-failure

    - name: Run the DANDI smoke test (reads a real NWB file over HTTPS)
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./build/Release/test_remfile.exe
        else
          ./build/test_remfile
        fi

    - name: Check installation and find_package consumption
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          export PREFIX_PATH="$CONDA_PREFIX/Library"
        else
          export PREFIX_PATH="$CONDA_PREFIX"
        fi
        cmake --install build --config Release --prefix "$PWD/install"
        # A downstream project must be able to find and link remfile::remfile
        mkdir -p consumer && cd consumer
        cat > CMakeLists.txt <<'EOF'
        cmake_minimum_required(VERSION 3.15)
        project(consumer LANGUAGES C CXX)
        find_package(remfile REQUIRED)
        add_executable(consumer main.c)
        target_link_libraries(consumer PRIVATE remfile::remfile)
        EOF
        cat > main.c <<'EOF'
        #include <hdf5.h>
        #include <remfile/remfile_vfd.h>
        int main(void) {
            hid_t fapl = H5Pcreate(H5P_FILE_ACCESS);
            return H5Pset_fapl_remfile(fapl, NULL) < 0 ? 1 : 0;
        }
        EOF
        cmake -B build -DCMAKE_PREFIX_PATH="../install;$PREFIX_PATH" \
              -DHDF5_ROOT="$PREFIX_PATH" -DHDF5_USE_STATIC_LIBRARIES=OFF
        cmake --build build --config Release
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./build/Release/consumer.exe
        else
          ./build/consumer
        fi

  # The dynamically loadable VFD plugin requires HDF5 >= 1.14. Verify it can be
  # loaded by name via HDF5_PLUGIN_PATH, with nothing linked against remfile.
  plugin:
    name: VFD plugin (HDF5_PLUGIN_PATH)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: remfile
        channels: conda-forge
        conda-remove-defaults: true

    - name: Install HDF5 and libcurl
      run: conda install -y "hdf5=2.1" libcurl

    - name: Build the plugin
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
              -DCMAKE_PREFIX_PATH="$CONDA_PREFIX" -DHDF5_ROOT="$CONDA_PREFIX" \
              -DREMFILE_BUILD_PLUGIN=ON
        cmake --build build --config Release -j 2

    - name: Load the driver by name and read a remote file
      run: |
        cat > plugin_test.c <<'EOF'
        #include <stdio.h>
        #include <hdf5.h>
        int main(void) {
            const char *url = "https://dandiarchive.s3.amazonaws.com/blobs/d86/055/"
                              "d8605573-4639-4b99-a6d9-e0ac13f9a7df";
            hid_t fapl = H5Pcreate(H5P_FILE_ACCESS);
            if (H5Pset_driver_by_name(fapl, "remfile", NULL) < 0) {
                fprintf(stderr, "plugin not found\n");
                return 1;
            }
            hid_t file = H5Fopen(url, H5F_ACC_RDONLY, fapl);
            if (file < 0) { fprintf(stderr, "open failed\n"); return 1; }
            printf("opened remote file via dynamically loaded remfile VFD\n");
            H5Fclose(file);
            return 0;
        }
        EOF
        # Note: nothing here links against remfile — the driver is found at runtime.
        cc -I"$CONDA_PREFIX/include" plugin_test.c \
           -L"$CONDA_PREFIX/lib" -lhdf5 -Wl,-rpath,"$CONDA_PREFIX/lib" \
           -o plugin_test
        HDF5_PLUGIN_PATH="$PWD/build" ./plugin_test
